name: Deploy MecaToolbox Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'heat_convection/frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: heat_convection/frontend/package-lock.json

      - name: Install & Build
        working-directory: heat_convection/frontend
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: heat_convection/frontend/dist

      - id: deployment
        uses: actions/deploy-pages@v4
